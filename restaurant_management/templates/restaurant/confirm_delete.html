{% extends 'base.html' %}
{% block title %}Confirm Delete{% endblock %}
{% block content %}
<h2>Delete "{{ object }}"?</h2>
<p class="text-muted">This action cannot be undone.</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, delete</button>
    <a href="{% url 'menu_list' %}" class="btn btn-outline-secondary">Cancel</a>
</form>
{% endblock %}
